spring.application.name=univVoting


spring.datasource.url=jdbc:postgresql://localhost:5432/univ_voting
spring.datasource.username=postgres
spring.datasource.password=muskan
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-migration-naming=false
spring.flyway.ignore-future-migrations=true


# Disable Thymeleaf as we're using React
spring.thymeleaf.enabled=false

# CORS Configuration
spring.mvc.cors.allowed-origins=http://localhost:5173
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true

# Session management configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax


spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN

